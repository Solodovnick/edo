spring:
  application:
    name: edo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/edo_demo}
    username: ${DB_USER:edo}
    password: ${DB_PASS:edo_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
server:
  port: ${SERVER_PORT:8080}
springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/swagger-ui
edo:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
logging:
  level:
    bank.edo: INFO
    org.flywaydb: INFO
